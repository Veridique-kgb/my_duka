{% extends 'base.html' %}
{% block title %} sales {% endblock %}
{% block content %}
<div>
  <p>This is sales section</p>

  <!-- Button trigger modal -->
  <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
    Making sales
  </button>

  <!-- Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Making sales</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div>
            <form action="/make_sales" , method="post">
              <div>
                <select class="form-select" aria-label="Default select example" name="pid">
                  <option selected>Select a product</option>
                  {% for product in products %}
                  <option value="{{ product[0] }}">{{ product[1] }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">quantity</label>
                <input type="number" name="s_quantity" class="form-control" id="exampleInputPassword1">
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="submit" class="btn btn-primary">Make sale</button>
              </div>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>

  <table id="example" class="table table-striped">
    <thead>
      <tr>
        <th>Sales ID</th>
        <th>Product ID</th>
        <th>Quantity</th>
        <th>created at</th>

      </tr>
    </thead>
    <tbody>
      {% for i in sales_data %}
      <tr>
        <td>{{ i[0] }}</td>
        <td>{{ i[1] }}</td>
        <td>{{ i[2] }}</td>
        <td>{{ i[3] }}</td>

      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>


{% endblock %}
