{% extends 'base.html' %}
{% block title %} stock {% endblock %}
{% block content %}
<div>
    <p>This is stock section</p>


<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Stocking
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Adding Stock</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div>
<form action="/add_stock", method="post">
    <div>
   <select class="form-select" aria-label="Default select example" name="pid">
  <option selected>Select a product</option>
  {% for product in products %}
  <option value="{{ product[0] }}">{{ product[1] }}</option>
  {% endfor %}
</select>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">stock_quantity</label>
    <input type="number" name="st_quantity" class="form-control" id="exampleInputPassword1">
  </div> 
  <button type="submit" class="btn btn-primary">Add Stock</button>
</form>

</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>


<table id="example" class="table table-striped">
        <thead>
            <tr>
                <th>Stock ID</th>
                <th>Product ID</th>
                <th>Stock_quantity</th>
                <th>Created at</th>
               
            </tr>
        </thead>
        <tbody>
            {% for i in stock_data %}
            <tr>
                <td>{{ i[0] }}</td>
                <td>{{ i[1] }}</td>
                <td>{{ i[2] }}</td>
                <td>{{ i[3] }}</td>
               
            </tr>
            {% endfor %}
             </tbody>
            </table>
</div>


{% endblock %}
